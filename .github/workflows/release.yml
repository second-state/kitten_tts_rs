name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: kitten-tts-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: kitten-tts-aarch64-linux
          - target: aarch64-apple-darwin
            os: macos-15
            name: kitten-tts-aarch64-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release, CPU only)
        run: cargo build --release --target ${{ matrix.target }}
        env:
          ORT_LIB_STRATEGY: download

      - name: Package binaries
        run: |
          mkdir -p dist/${{ matrix.name }}
          cp target/${{ matrix.target }}/release/kitten-tts dist/${{ matrix.name }}/
          cp target/${{ matrix.target }}/release/kitten-tts-server dist/${{ matrix.name }}/
          chmod +x dist/${{ matrix.name }}/kitten-tts dist/${{ matrix.name }}/kitten-tts-server
          cd dist && tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.tar.gz

  bundle-models:
    runs-on: ubuntu-latest
    steps:
      - name: Download all models from Hugging Face
        run: |
          mkdir -p models/kitten-tts-mini
          for FILE in config.json kitten_tts_mini_v0_8.onnx voices.npz; do
            curl -L -o "models/kitten-tts-mini/$FILE" \
              "https://huggingface.co/KittenML/kitten-tts-mini-0.8/resolve/main/$FILE"
          done

          mkdir -p models/kitten-tts-micro
          for FILE in config.json kitten_tts_micro_v0_8.onnx voices.npz; do
            curl -L -o "models/kitten-tts-micro/$FILE" \
              "https://huggingface.co/KittenML/kitten-tts-micro-0.8/resolve/main/$FILE"
          done

          mkdir -p models/kitten-tts-nano
          for FILE in config.json kitten_tts_nano_v0_8.onnx voices.npz; do
            curl -L -o "models/kitten-tts-nano/$FILE" \
              "https://huggingface.co/KittenML/kitten-tts-nano-0.8-fp32/resolve/main/$FILE"
          done

          mkdir -p models/kitten-tts-nano-int8
          for FILE in config.json kitten_tts_nano_v0_8.onnx voices.npz; do
            curl -L -o "models/kitten-tts-nano-int8/$FILE" \
              "https://huggingface.co/KittenML/kitten-tts-nano-0.8-int8/resolve/main/$FILE"
          done

          echo "Downloaded models:"
          du -sh models/*/

      - name: Package models
        run: tar czf kitten-tts-models.tar.gz models

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitten-tts-models
          path: kitten-tts-models.tar.gz

  release:
    needs: [build, bundle-models]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
