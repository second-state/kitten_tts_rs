name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Check compilation with GPU features
        run: |
          for FEATURE in cuda tensorrt coreml directml; do
            echo "Checking --features $FEATURE ..."
            cargo check --features "$FEATURE"
          done

      - name: Build (release)
        run: cargo build --release

      - name: Run unit tests
        run: cargo test --release

      - name: Install espeak-ng
        run: sudo apt-get update && sudo apt-get install -y espeak-ng

      - name: Download model (kitten-tts-nano int8, smallest)
        run: |
          mkdir -p models/kitten-tts-nano-int8
          for FILE in config.json kitten_tts_nano_v0_8.onnx voices.npz; do
            curl -L -o "models/kitten-tts-nano-int8/$FILE" \
              "https://huggingface.co/KittenML/kitten-tts-nano-0.8-int8/resolve/main/$FILE"
          done
          echo "Downloaded model files:"
          ls -lh models/kitten-tts-nano-int8/

      - name: Generate test audio (all voices)
        run: |
          mkdir -p test-output
          for VOICE in Bella Jasper Luna Bruno Rosie Hugo Kiki Leo; do
            echo "Generating with voice: $VOICE"
            ./target/release/kitten-tts ./models/kitten-tts-nano-int8 \
              "Hello! This is a test of Kitten TTS in Rust, using the $VOICE voice." \
              "$VOICE" --output "test-output/${VOICE}.wav"
          done
          ls -lh test-output/

      - name: Test API server
        run: |
          ./target/release/kitten-tts-server ./models/kitten-tts-nano-int8 --port 8080 &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done

          # Test health endpoint
          curl -sf http://localhost:8080/health
          echo ""

          # Test models endpoint
          curl -sf http://localhost:8080/v1/models
          echo ""

          # Generate audio via API with different voices
          mkdir -p test-output/api
          for VOICE in alloy echo fable onyx nova shimmer; do
            echo "Generating via API with voice: $VOICE"
            curl -sf -X POST http://localhost:8080/v1/audio/speech \
              -H "Content-Type: application/json" \
              -d "{\"input\": \"Hello from the API server, using the $VOICE voice.\", \"voice\": \"$VOICE\"}" \
              --output "test-output/api/${VOICE}.wav"
          done
          ls -lh test-output/api/

          kill $SERVER_PID

      - name: Upload test audio artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-audio
          path: test-output/**/*.wav
          retention-days: 14
